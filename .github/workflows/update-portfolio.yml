name: Update Portfolio Data

# ═══════════════════════════════════════════════════════════════════════════════
# Déclenchement : tous les dimanches à 20h00 heure Paris (été ET hiver)
# + déclenchement manuel pour les tests
# ═══════════════════════════════════════════════════════════════════════════════
on:
  schedule:
    # Heure d'été (CEST, fin mars → fin oct) : 18h UTC = 20h Paris
    - cron: '0 18 * * 0'
    # Heure d'hiver (CET, fin oct → fin mars) : 19h UTC = 20h Paris
    - cron: '0 19 * * 0'
  workflow_dispatch:  # Déclenchement manuel

jobs:
  update:
    runs-on: ubuntu-latest

    # Permissions nécessaires pour push
    permissions:
      contents: write

    env:
      LI_USERNAME: ${{ secrets.LI_USERNAME }}
      LI_PASSWORD: ${{ secrets.LI_PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ─── Anti-doublon : skip si un run a eu lieu dans les 2 dernières heures ─
      - name: Check for recent run (anti-duplicate)
        id: dedup
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'update-portfolio.yml',
              status: 'completed',
              per_page: 1
            });
            if (runs.data.workflow_runs.length > 0) {
              const lastRun = new Date(runs.data.workflow_runs[0].updated_at);
              const now = new Date();
              const diffHours = (now - lastRun) / (1000 * 60 * 60);
              if (diffHours < 2) {
                core.setOutput('skip', 'true');
                console.log(`Dernier run il y a ${diffHours.toFixed(1)}h — skip pour éviter le doublon`);
              } else {
                core.setOutput('skip', 'false');
                console.log(`Dernier run il y a ${diffHours.toFixed(1)}h — exécution normale`);
              }
            } else {
              core.setOutput('skip', 'false');
            }

      - name: Skip if duplicate
        if: steps.dedup.outputs.skip == 'true'
        run: |
          echo "⏭️ Run ignoré — un run a déjà eu lieu dans les 2 dernières heures"
          exit 0

      # ─── Setup ──────────────────────────────────────────────────────────
      - name: Checkout repository
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        if: steps.dedup.outputs.skip != 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        if: steps.dedup.outputs.skip != 'true'
        run: pip install -r scripts/requirements.txt

      # ─── Scraping ───────────────────────────────────────────────────────
      - name: Scrape LinkedIn
        if: steps.dedup.outputs.skip != 'true'
        run: python scripts/scraper_linkedin.py

      - name: Scrape GitHub
        if: steps.dedup.outputs.skip != 'true'
        run: python scripts/scraper_github.py

      # ─── Traitement ─────────────────────────────────────────────────────
      - name: Process data
        if: steps.dedup.outputs.skip != 'true'
        run: python scripts/data_processor.py

      # ─── Mise à jour du portfolio ───────────────────────────────────────
      - name: Update portfolio files
        if: steps.dedup.outputs.skip != 'true'
        run: python scripts/portfolio_updater.py

      # ─── Validation ─────────────────────────────────────────────────────
      - name: Validate portfolio data
        if: steps.dedup.outputs.skip != 'true'
        id: validate
        run: python scripts/validate.py

      # ─── Commit & Push (seulement si changements détectés) ──────────────
      - name: Check for changes
        if: steps.dedup.outputs.skip != 'true'
        id: git_check
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.dedup.outputs.skip != 'true' && steps.git_check.outputs.changed == 'true'
        run: |
          git config user.name "portfolio-bot"
          git config user.email "bot@portfolio.auto"
          git add -A
          git commit -m "chore: auto-update portfolio data [$(date +'%Y-%m-%d')]"
          git push

      - name: No changes detected
        if: steps.dedup.outputs.skip != 'true' && steps.git_check.outputs.changed == 'false'
        run: echo "✅ Aucun changement détecté — pas de commit nécessaire"
